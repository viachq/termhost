<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="50%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73550"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#0a0a0a"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
    </g>

    <!-- Big stylized "A" made from terminal-like elements -->
    <!-- Left leg -->
    <path d="M 310 760 L 460 264 L 490 264 L 380 760 Z" fill="url(#aGrad)"/>
    <!-- Right leg -->
    <path d="M 644 760 L 534 264 L 564 264 L 714 760 Z" fill="url(#aGrad)"/>
    <!-- Crossbar — styled as terminal prompt line -->
    <rect x="360" y="540" width="304" height="36" rx="6" fill="url(#aGrad)"/>

    <!-- Terminal cursor inside the A -->
    <rect x="480" y="440" width="24" height="48" rx="4" fill="#ffffff" opacity="0.9"/>

    <!-- Prompt chevron on the crossbar -->
    <text x="376" y="568" font-family="monospace" font-size="32" fill="#0a0a0a" font-weight="bold">❯</text>

    <!-- Small dots representing workspace panes — bottom right -->
    <g transform="translate(680, 680)">
      <rect x="0" y="0" width="40" height="32" rx="5" fill="#e94560" opacity="0.3"/>
      <rect x="48" y="0" width="40" height="32" rx="5" fill="#e94560" opacity="0.2"/>
      <rect x="0" y="40" width="40" height="32" rx="5" fill="#e94560" opacity="0.2"/>
      <rect x="48" y="40" width="40" height="32" rx="5" fill="#e94560" opacity="0.15"/>
    </g>
  </g>
</svg>
