<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="46%" r="68%">
      <stop offset="0%" stop-color="#0e0812"/>
      <stop offset="100%" stop-color="#030305"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cursorGlow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <ellipse cx="512" cy="470" rx="320" ry="280" fill="#e94560" opacity="0.025"/>

    <!-- Terminal -->
    <rect x="140" y="140" width="744" height="744" rx="40" fill="#0a0a0e" stroke="#1c1c24" stroke-width="2"/>

    <!-- Mac dots -->
    <circle cx="200" cy="200" r="14" fill="#ff5f57"/>
    <circle cx="244" cy="200" r="14" fill="#febc2e"/>
    <circle cx="288" cy="200" r="14" fill="#28c840"/>

    <!-- Prompt 1 -->
    <text x="190" y="350" font-family="monospace" font-size="80" fill="url(#ac)" font-weight="700" filter="url(#glow)">❯</text>
    <rect x="290" y="300" width="380" height="54" rx="10" fill="#e94560" opacity="0.09"/>
    <rect x="686" y="298" width="28" height="58" rx="5" fill="#e94560" filter="url(#cursorGlow)"/>

    <!-- Output — big chunky lines -->
    <rect x="190" y="390" width="500" height="30" rx="8" fill="#28c840" opacity="0.1"/>
    <rect x="190" y="436" width="350" height="30" rx="8" fill="#d4d4d4" opacity="0.05"/>
    <rect x="190" y="482" width="580" height="30" rx="8" fill="#d4d4d4" opacity="0.035"/>
    <rect x="190" y="528" width="280" height="30" rx="8" fill="#febc2e" opacity="0.07"/>
    <rect x="190" y="574" width="420" height="30" rx="8" fill="#d4d4d4" opacity="0.03"/>

    <!-- Prompt 2 -->
    <text x="190" y="700" font-family="monospace" font-size="70" fill="url(#ac)" font-weight="700" filter="url(#glow)" opacity="0.5">❯</text>
    <rect x="278" y="658" width="260" height="46" rx="10" fill="#e94560" opacity="0.05"/>

    <!-- Prompt 3 hint -->
    <text x="190" y="820" font-family="monospace" font-size="60" fill="url(#ac)" font-weight="700" opacity="0.15">❯</text>
  </g>
</svg>
