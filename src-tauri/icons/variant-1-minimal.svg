<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#0a0a0a"/>

    <!-- Workspace grid (subtle) -->
    <line x1="512" y1="420" x2="512" y2="820" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="280" y1="620" x2="744" y2="620" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Terminal window frame -->
    <rect x="240" y="380" width="544" height="440" rx="24" fill="none" stroke="#2a2a2a" stroke-width="4"/>

    <!-- Title bar dots -->
    <circle cx="284" cy="416" r="10" fill="#e94560"/>
    <circle cx="316" cy="416" r="10" fill="#f59e0b"/>
    <circle cx="348" cy="416" r="10" fill="#22c55e"/>

    <!-- Divider under title bar -->
    <line x1="240" y1="444" x2="784" y2="444" stroke="#2a2a2a" stroke-width="3"/>

    <!-- Prompt line 1 -->
    <text x="280" y="510" font-family="monospace" font-size="42" fill="#e94560" font-weight="bold">❯</text>
    <rect x="320" y="488" width="180" height="28" rx="4" fill="#e94560" opacity="0.2"/>

    <!-- Prompt line 2 -->
    <text x="280" y="580" font-family="monospace" font-size="42" fill="#e94560" font-weight="bold">❯</text>
    <rect x="320" y="558" width="120" height="28" rx="4" fill="#3b3b3b"/>

    <!-- Cursor block -->
    <rect x="448" y="556" width="18" height="32" rx="2" fill="#e94560">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Split panes indicator — 4 small squares -->
    <rect x="600" y="470" width="60" height="50" rx="6" fill="none" stroke="#e94560" stroke-width="3" opacity="0.6"/>
    <rect x="668" y="470" width="60" height="50" rx="6" fill="none" stroke="#e94560" stroke-width="3" opacity="0.4"/>
    <rect x="600" y="528" width="60" height="50" rx="6" fill="none" stroke="#e94560" stroke-width="3" opacity="0.4"/>
    <rect x="668" y="528" width="60" height="50" rx="6" fill="none" stroke="#e94560" stroke-width="3" opacity="0.2"/>

    <!-- Output lines -->
    <rect x="280" y="640" width="200" height="16" rx="4" fill="#2a2a2a"/>
    <rect x="280" y="670" width="140" height="16" rx="4" fill="#2a2a2a"/>
    <rect x="280" y="700" width="240" height="16" rx="4" fill="#2a2a2a"/>

    <!-- Top label "AW" -->
    <text x="512" y="320" font-family="system-ui, sans-serif" font-size="80" fill="#e94560" text-anchor="middle" font-weight="700" letter-spacing="8">AW</text>
  </g>
</svg>
