<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="40%" stop-color="#c73550"/>
      <stop offset="100%" stop-color="#1a0a1e"/>
    </linearGradient>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="14" stdDeviation="40" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffc0cb"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- Bold red-to-dark gradient -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Terminal -->
    <rect x="152" y="152" width="720" height="720" rx="36" fill="#0c0c14" filter="url(#termShadow)"/>
    <rect x="152" y="152" width="720" height="720" rx="36" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

    <!-- Title bar -->
    <rect x="152" y="152" width="720" height="58" rx="36" fill="#181824"/>
    <rect x="152" y="188" width="720" height="22" fill="#181824"/>

    <!-- Dots -->
    <circle cx="210" cy="184" r="13" fill="#ff5f57"/>
    <circle cx="250" cy="184" r="13" fill="#febc2e"/>
    <circle cx="290" cy="184" r="13" fill="#28c840"/>

    <!-- Prompt -->
    <text x="200" y="330" font-family="monospace" font-size="72" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="290" y="286" width="340" height="48" rx="10" fill="#ffffff" opacity="0.06"/>
    <rect x="646" y="284" width="24" height="52" rx="5" fill="#ffffff" opacity="0.85"/>

    <!-- Output -->
    <rect x="200" y="368" width="440" height="28" rx="7" fill="#28c840" opacity="0.2"/>
    <rect x="200" y="410" width="310" height="28" rx="7" fill="#ffffff" opacity="0.08"/>
    <rect x="200" y="452" width="480" height="28" rx="7" fill="#ffffff" opacity="0.05"/>
    <rect x="200" y="494" width="250" height="28" rx="7" fill="#febc2e" opacity="0.14"/>
    <rect x="200" y="536" width="400" height="28" rx="7" fill="#ffffff" opacity="0.04"/>

    <!-- Prompt 2 -->
    <text x="200" y="650" font-family="monospace" font-size="64" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.45">❯</text>
    <rect x="280" y="614" width="220" height="42" rx="8" fill="#ffffff" opacity="0.03"/>

    <!-- Prompt 3 -->
    <text x="200" y="780" font-family="monospace" font-size="56" fill="url(#ac)" font-weight="700" opacity="0.12">❯</text>
  </g>
</svg>
