<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#150810"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="g3">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <ellipse cx="512" cy="480" rx="340" ry="280" fill="#e94560" opacity="0.04"/>

    <!-- Terminal — large, 4-pane layout -->
    <rect x="120" y="140" width="784" height="740" rx="32" fill="#0b0b0f" stroke="#222228" stroke-width="2.5"/>

    <!-- Title bar -->
    <rect x="120" y="140" width="784" height="52" rx="32" fill="#111115"/>
    <rect x="120" y="168" width="784" height="24" fill="#111115"/>
    <line x1="120" y1="192" x2="904" y2="192" stroke="#1c1c22" stroke-width="2"/>

    <!-- Mac dots -->
    <circle cx="172" cy="166" r="9" fill="#ff5f57"/>
    <circle cx="204" cy="166" r="9" fill="#febc2e"/>
    <circle cx="236" cy="166" r="9" fill="#28c840"/>

    <!-- Split dividers — cross pattern -->
    <line x1="512" y1="192" x2="512" y2="880" stroke="#e94560" stroke-width="2" opacity="0.3" filter="url(#g3)"/>
    <line x1="120" y1="536" x2="904" y2="536" stroke="#e94560" stroke-width="2" opacity="0.25" filter="url(#g3)"/>

    <!-- Pane 1 (top-left) — main -->
    <text x="168" y="260" font-family="monospace" font-size="44" fill="url(#ag)" font-weight="bold" filter="url(#g3)">❯</text>
    <rect x="216" y="238" width="200" height="28" rx="5" fill="#e94560" opacity="0.12"/>
    <rect x="424" y="236" width="18" height="32" rx="3" fill="#e94560" filter="url(#g2)"/>
    <rect x="168" y="286" width="260" height="14" rx="3" fill="#e94560" opacity="0.06"/>
    <rect x="168" y="310" width="180" height="14" rx="3" fill="#e94560" opacity="0.04"/>
    <rect x="168" y="334" width="300" height="14" rx="3" fill="#ffffff" opacity="0.03"/>
    <text x="168" y="410" font-family="monospace" font-size="44" fill="url(#ag)" font-weight="bold" opacity="0.6">❯</text>

    <!-- Pane 2 (top-right) — files -->
    <rect x="548" y="220" width="180" height="16" rx="3" fill="#28c840" opacity="0.12"/>
    <rect x="564" y="252" width="140" height="12" rx="3" fill="#ffffff" opacity="0.05"/>
    <rect x="564" y="274" width="200" height="12" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="564" y="296" width="160" height="12" rx="3" fill="#e94560" opacity="0.08"/>
    <rect x="564" y="318" width="120" height="12" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="564" y="340" width="180" height="12" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="564" y="362" width="100" height="12" rx="3" fill="#febc2e" opacity="0.08"/>
    <rect x="564" y="384" width="150" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="564" y="406" width="190" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="564" y="428" width="130" height="12" rx="3" fill="#ffffff" opacity="0.03"/>

    <!-- Pane 3 (bottom-left) — secondary terminal -->
    <text x="168" y="610" font-family="monospace" font-size="38" fill="#6a6a8a" font-weight="bold">❯</text>
    <rect x="210" y="592" width="140" height="22" rx="4" fill="#ffffff" opacity="0.04"/>
    <rect x="168" y="634" width="220" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="168" y="656" width="160" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="168" y="678" width="260" height="12" rx="3" fill="#ffffff" opacity="0.02"/>

    <!-- Pane 4 (bottom-right) — logs -->
    <rect x="548" y="568" width="120" height="14" rx="3" fill="#febc2e" opacity="0.1"/>
    <rect x="548" y="594" width="300" height="12" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="548" y="616" width="260" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="548" y="638" width="320" height="12" rx="3" fill="#e94560" opacity="0.05"/>
    <rect x="548" y="660" width="200" height="12" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="548" y="682" width="280" height="12" rx="3" fill="#ffffff" opacity="0.03"/>

    <!-- Bottom glow -->
    <ellipse cx="512" cy="880" rx="280" ry="50" fill="#e94560" opacity="0.05"/>
  </g>
</svg>
