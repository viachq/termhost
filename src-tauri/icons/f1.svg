<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="36" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c28"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- Gradient background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Decorative glow orbs -->
    <circle cx="200" cy="200" r="200" fill="#e94560" opacity="0.08"/>
    <circle cx="824" cy="824" r="200" fill="#0f3460" opacity="0.15"/>

    <!-- Terminal window -->
    <rect x="152" y="152" width="720" height="720" rx="36" fill="url(#termBg)" filter="url(#termShadow)"/>
    <rect x="152" y="152" width="720" height="720" rx="36" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

    <!-- Title bar -->
    <rect x="152" y="152" width="720" height="60" rx="36" fill="#222232"/>
    <rect x="152" y="190" width="720" height="22" fill="#222232"/>

    <!-- Dots -->
    <circle cx="210" cy="186" r="13" fill="#ff5f57"/>
    <circle cx="250" cy="186" r="13" fill="#febc2e"/>
    <circle cx="290" cy="186" r="13" fill="#28c840"/>

    <!-- Title text hint -->
    <rect x="440" y="178" width="120" height="16" rx="4" fill="#ffffff" opacity="0.06"/>

    <!-- Prompt 1 -->
    <text x="200" y="330" font-family="monospace" font-size="72" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="290" y="286" width="330" height="48" rx="10" fill="#ffffff" opacity="0.06"/>
    <rect x="636" y="284" width="24" height="52" rx="5" fill="#e94560" opacity="0.9"/>

    <!-- Output -->
    <rect x="200" y="368" width="440" height="28" rx="7" fill="#28c840" opacity="0.2"/>
    <rect x="200" y="410" width="310" height="28" rx="7" fill="#ffffff" opacity="0.07"/>
    <rect x="200" y="452" width="480" height="28" rx="7" fill="#ffffff" opacity="0.05"/>
    <rect x="200" y="494" width="250" height="28" rx="7" fill="#febc2e" opacity="0.15"/>
    <rect x="200" y="536" width="400" height="28" rx="7" fill="#ffffff" opacity="0.04"/>

    <!-- Prompt 2 -->
    <text x="200" y="650" font-family="monospace" font-size="64" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.5">❯</text>
    <rect x="280" y="614" width="220" height="42" rx="8" fill="#ffffff" opacity="0.03"/>

    <!-- Prompt 3 -->
    <text x="200" y="780" font-family="monospace" font-size="56" fill="url(#ac)" font-weight="700" opacity="0.15">❯</text>
  </g>
</svg>
