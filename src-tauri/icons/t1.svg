<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="12" stdDeviation="36" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="tb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Terminal -->
    <rect x="152" y="152" width="720" height="720" rx="36" fill="url(#tb)" filter="url(#sh)"/>
    <rect x="152" y="152" width="720" height="720" rx="36" fill="none" stroke="#fff" stroke-width="1" opacity="0.07"/>

    <!-- Title bar -->
    <rect x="152" y="152" width="720" height="58" rx="36" fill="#1a1a2a"/>
    <rect x="152" y="188" width="720" height="22" fill="#1a1a2a"/>
    <circle cx="210" cy="184" r="13" fill="#ff5f57"/>
    <circle cx="250" cy="184" r="13" fill="#febc2e"/>
    <circle cx="290" cy="184" r="13" fill="#28c840"/>

    <!-- git status output style -->
    <!-- Path -->
    <rect x="200" y="240" width="200" height="24" rx="5" fill="#7dd3fc" opacity="0.18"/>
    <rect x="414" y="240" width="80" height="24" rx="5" fill="#28c840" opacity="0.25"/>

    <!-- Prompt -->
    <text x="200" y="320" font-family="monospace" font-size="60" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="272" y="282" width="120" height="40" rx="8" fill="#fff" opacity="0.06"/>
    <rect x="406" y="282" width="180" height="40" rx="8" fill="#fff" opacity="0.04"/>

    <!-- Modified files -->
    <rect x="220" y="356" width="36" height="24" rx="5" fill="#febc2e" opacity="0.3"/>
    <rect x="270" y="356" width="260" height="24" rx="5" fill="#fff" opacity="0.08"/>

    <rect x="220" y="394" width="36" height="24" rx="5" fill="#28c840" opacity="0.3"/>
    <rect x="270" y="394" width="320" height="24" rx="5" fill="#fff" opacity="0.08"/>

    <rect x="220" y="432" width="36" height="24" rx="5" fill="#28c840" opacity="0.3"/>
    <rect x="270" y="432" width="200" height="24" rx="5" fill="#fff" opacity="0.08"/>

    <rect x="220" y="470" width="36" height="24" rx="5" fill="#ff5f57" opacity="0.3"/>
    <rect x="270" y="470" width="280" height="24" rx="5" fill="#fff" opacity="0.08"/>

    <rect x="220" y="508" width="36" height="24" rx="5" fill="#febc2e" opacity="0.3"/>
    <rect x="270" y="508" width="240" height="24" rx="5" fill="#fff" opacity="0.08"/>

    <!-- Summary line -->
    <rect x="200" y="566" width="160" height="24" rx="5" fill="#28c840" opacity="0.15"/>
    <rect x="374" y="566" width="100" height="24" rx="5" fill="#ff5f57" opacity="0.15"/>
    <rect x="488" y="566" width="120" height="24" rx="5" fill="#febc2e" opacity="0.15"/>

    <!-- Next prompt -->
    <text x="200" y="660" font-family="monospace" font-size="52" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.5">❯</text>
    <rect x="264" y="628" width="24" height="36" rx="5" fill="#e94560" opacity="0.7"/>

    <!-- Faded prompt -->
    <text x="200" y="770" font-family="monospace" font-size="44" fill="url(#ac)" font-weight="700" opacity="0.12">❯</text>
  </g>
</svg>
