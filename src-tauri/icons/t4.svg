<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="12" stdDeviation="36" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cgl">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="tb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <rect x="152" y="152" width="720" height="720" rx="36" fill="url(#tb)" filter="url(#sh)"/>
    <rect x="152" y="152" width="720" height="720" rx="36" fill="none" stroke="#fff" stroke-width="1" opacity="0.07"/>

    <!-- Title bar -->
    <rect x="152" y="152" width="720" height="58" rx="36" fill="#1a1a2a"/>
    <rect x="152" y="188" width="720" height="22" fill="#1a1a2a"/>
    <circle cx="210" cy="184" r="13" fill="#ff5f57"/>
    <circle cx="250" cy="184" r="13" fill="#febc2e"/>
    <circle cx="290" cy="184" r="13" fill="#28c840"/>

    <!-- neofetch / system info style -->

    <!-- ASCII art block (left side) — simplified logo shape -->
    <g opacity="0.35" fill="url(#ac)">
      <rect x="200" y="260" width="180" height="28" rx="4"/>
      <rect x="200" y="298" width="40" height="28" rx="4"/>
      <rect x="200" y="336" width="180" height="28" rx="4"/>
      <rect x="200" y="374" width="180" height="28" rx="4"/>
      <rect x="340" y="298" width="40" height="28" rx="4"/>
      <rect x="200" y="412" width="40" height="28" rx="4"/>
      <rect x="340" y="412" width="40" height="28" rx="4"/>
      <rect x="200" y="450" width="180" height="28" rx="4"/>
    </g>

    <!-- System info (right side) -->
    <!-- OS -->
    <rect x="420" y="260" width="60" height="22" rx="4" fill="#e94560" opacity="0.3"/>
    <rect x="494" y="260" width="200" height="22" rx="4" fill="#fff" opacity="0.08"/>

    <!-- Host -->
    <rect x="420" y="296" width="60" height="22" rx="4" fill="#febc2e" opacity="0.25"/>
    <rect x="494" y="296" width="240" height="22" rx="4" fill="#fff" opacity="0.08"/>

    <!-- Kernel -->
    <rect x="420" y="332" width="80" height="22" rx="4" fill="#28c840" opacity="0.25"/>
    <rect x="514" y="332" width="180" height="22" rx="4" fill="#fff" opacity="0.08"/>

    <!-- Shell -->
    <rect x="420" y="368" width="60" height="22" rx="4" fill="#7dd3fc" opacity="0.25"/>
    <rect x="494" y="368" width="140" height="22" rx="4" fill="#fff" opacity="0.08"/>

    <!-- CPU -->
    <rect x="420" y="404" width="44" height="22" rx="4" fill="#c792ea" opacity="0.25"/>
    <rect x="478" y="404" width="280" height="22" rx="4" fill="#fff" opacity="0.06"/>

    <!-- Memory -->
    <rect x="420" y="440" width="80" height="22" rx="4" fill="#ff5f57" opacity="0.25"/>
    <rect x="514" y="440" width="200" height="22" rx="4" fill="#fff" opacity="0.06"/>

    <!-- Color palette row -->
    <g transform="translate(420, 490)">
      <rect x="0" y="0" width="36" height="28" rx="6" fill="#1a1a2a"/>
      <rect x="44" y="0" width="36" height="28" rx="6" fill="#ff5f57"/>
      <rect x="88" y="0" width="36" height="28" rx="6" fill="#28c840"/>
      <rect x="132" y="0" width="36" height="28" rx="6" fill="#febc2e"/>
      <rect x="176" y="0" width="36" height="28" rx="6" fill="#7dd3fc"/>
      <rect x="220" y="0" width="36" height="28" rx="6" fill="#c792ea"/>
      <rect x="264" y="0" width="36" height="28" rx="6" fill="#e94560"/>
      <rect x="308" y="0" width="36" height="28" rx="6" fill="#fff" opacity="0.5"/>
    </g>

    <!-- Prompt at bottom -->
    <text x="200" y="630" font-family="monospace" font-size="52" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="264" y="600" width="24" height="34" rx="5" fill="#e94560" filter="url(#cgl)"/>

    <text x="200" y="750" font-family="monospace" font-size="44" fill="url(#ac)" font-weight="700" opacity="0.12">❯</text>
  </g>
</svg>
