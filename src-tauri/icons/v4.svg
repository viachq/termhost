<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <filter id="gl">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#14101c"/>
      <stop offset="50%" stop-color="#0a0810"/>
      <stop offset="100%" stop-color="#14101c"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- Background with slight color -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Two accent glows — top and bottom -->
    <ellipse cx="512" cy="200" rx="300" ry="160" fill="#e94560" opacity="0.05"/>
    <ellipse cx="512" cy="824" rx="300" ry="160" fill="#e94560" opacity="0.05"/>

    <!-- Terminal — clear boundaries -->
    <rect x="140" y="140" width="744" height="744" rx="44" fill="#0e0e16" filter="url(#shadow)"/>
    <rect x="140" y="140" width="744" height="744" rx="44" fill="none" stroke="#2c2c3c" stroke-width="2.5"/>

    <!-- Title bar separator -->
    <line x1="160" y1="240" x2="864" y2="240" stroke="#2c2c3c" stroke-width="1.5"/>

    <!-- Dots -->
    <circle cx="206" cy="196" r="16" fill="#ff5f57"/>
    <circle cx="254" cy="196" r="16" fill="#febc2e"/>
    <circle cx="302" cy="196" r="16" fill="#28c840"/>

    <!-- Prompt 1 -->
    <text x="194" y="350" font-family="monospace" font-size="80" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="296" y="298" width="360" height="56" rx="12" fill="#e94560" opacity="0.12"/>
    <rect x="672" y="296" width="28" height="60" rx="6" fill="#e94560" filter="url(#cg)"/>

    <!-- Output -->
    <rect x="194" y="390" width="480" height="32" rx="8" fill="#28c840" opacity="0.14"/>
    <rect x="194" y="440" width="340" height="32" rx="8" fill="#a0a0b8" opacity="0.1"/>
    <rect x="194" y="490" width="520" height="32" rx="8" fill="#a0a0b8" opacity="0.07"/>
    <rect x="194" y="540" width="280" height="32" rx="8" fill="#febc2e" opacity="0.11"/>

    <!-- Prompt 2 -->
    <text x="194" y="670" font-family="monospace" font-size="70" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.55">❯</text>
    <rect x="286" y="628" width="260" height="48" rx="10" fill="#e94560" opacity="0.07"/>

    <!-- Prompt 3 -->
    <text x="194" y="798" font-family="monospace" font-size="60" fill="url(#ac)" font-weight="700" opacity="0.18">❯</text>
  </g>
</svg>
