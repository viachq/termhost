<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#120810"/>
      <stop offset="100%" stop-color="#040405"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cursorGlow">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <ellipse cx="512" cy="460" rx="280" ry="240" fill="#e94560" opacity="0.025"/>

    <!-- Terminal -->
    <rect x="140" y="140" width="744" height="744" rx="40" fill="#0a0a0e" stroke="#1c1c24" stroke-width="2"/>

    <!-- Mac dots -->
    <circle cx="200" cy="200" r="14" fill="#ff5f57"/>
    <circle cx="244" cy="200" r="14" fill="#febc2e"/>
    <circle cx="288" cy="200" r="14" fill="#28c840"/>

    <!-- Single big prompt — centered hero -->
    <text x="240" y="460" font-family="monospace" font-size="120" fill="url(#ac)" font-weight="700" filter="url(#glow)">❯</text>

    <!-- Command block -->
    <rect x="380" y="388" width="340" height="72" rx="14" fill="#e94560" opacity="0.08"/>
    <rect x="380" y="388" width="340" height="72" rx="14" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.12"/>

    <!-- Cursor -->
    <rect x="736" y="386" width="30" height="76" rx="6" fill="#e94560" filter="url(#cursorGlow)"/>

    <!-- Output below — fewer, bigger -->
    <rect x="240" y="500" width="480" height="32" rx="8" fill="#28c840" opacity="0.08"/>
    <rect x="240" y="548" width="360" height="32" rx="8" fill="#d4d4d4" opacity="0.04"/>
    <rect x="240" y="596" width="540" height="32" rx="8" fill="#d4d4d4" opacity="0.03"/>

    <!-- Second prompt faded -->
    <text x="240" y="740" font-family="monospace" font-size="80" fill="url(#ac)" font-weight="700" opacity="0.2">❯</text>
  </g>
</svg>
