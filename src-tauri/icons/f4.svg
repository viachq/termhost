<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="36" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="acGlow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- Teal gradient bg -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Warm accent spot -->
    <circle cx="350" cy="350" r="240" fill="#e94560" opacity="0.06"/>

    <!-- Terminal -->
    <rect x="152" y="152" width="720" height="720" rx="36" fill="url(#termBg)" filter="url(#termShadow)"/>
    <rect x="152" y="152" width="720" height="720" rx="36" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

    <!-- Title bar -->
    <rect x="152" y="152" width="720" height="58" rx="36" fill="#1a1a2a"/>
    <rect x="152" y="188" width="720" height="22" fill="#1a1a2a"/>

    <!-- Dots -->
    <circle cx="210" cy="184" r="13" fill="#ff5f57"/>
    <circle cx="250" cy="184" r="13" fill="#febc2e"/>
    <circle cx="290" cy="184" r="13" fill="#28c840"/>

    <!-- Prompt -->
    <text x="200" y="330" font-family="monospace" font-size="72" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="290" y="286" width="340" height="48" rx="10" fill="#e94560" opacity="0.1"/>
    <rect x="646" y="284" width="24" height="52" rx="5" fill="#e94560" filter="url(#acGlow)"/>

    <!-- Output -->
    <rect x="200" y="368" width="440" height="28" rx="7" fill="#28c840" opacity="0.22"/>
    <rect x="200" y="410" width="310" height="28" rx="7" fill="#7dd3fc" opacity="0.1"/>
    <rect x="200" y="452" width="480" height="28" rx="7" fill="#7dd3fc" opacity="0.07"/>
    <rect x="200" y="494" width="250" height="28" rx="7" fill="#febc2e" opacity="0.15"/>
    <rect x="200" y="536" width="400" height="28" rx="7" fill="#7dd3fc" opacity="0.05"/>

    <!-- Prompt 2 -->
    <text x="200" y="650" font-family="monospace" font-size="64" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.5">❯</text>
    <rect x="280" y="614" width="220" height="42" rx="8" fill="#e94560" opacity="0.05"/>

    <!-- Prompt 3 -->
    <text x="200" y="780" font-family="monospace" font-size="56" fill="url(#ac)" font-weight="700" opacity="0.15">❯</text>
  </g>
</svg>
