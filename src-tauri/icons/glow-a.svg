<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a0a12"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="g3">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Ambient glow -->
    <ellipse cx="512" cy="500" rx="360" ry="300" fill="#e94560" opacity="0.05"/>

    <!-- Terminal window — large -->
    <rect x="120" y="160" width="784" height="700" rx="32" fill="#0c0c10" stroke="#222228" stroke-width="2.5"/>

    <!-- Title bar -->
    <rect x="120" y="160" width="784" height="52" rx="32" fill="#131316"/>
    <rect x="120" y="188" width="784" height="24" fill="#131316"/>
    <line x1="120" y1="212" x2="904" y2="212" stroke="#1c1c22" stroke-width="2"/>

    <!-- Mac dots — clean circles, no box -->
    <circle cx="172" cy="186" r="9" fill="#ff5f57"/>
    <circle cx="204" cy="186" r="9" fill="#febc2e"/>
    <circle cx="236" cy="186" r="9" fill="#28c840"/>

    <!-- Prompt 1 -->
    <text x="172" y="290" font-family="monospace" font-size="48" fill="url(#ag)" font-weight="bold" filter="url(#g3)">❯</text>
    <rect x="224" y="264" width="280" height="32" rx="6" fill="#e94560" opacity="0.12"/>
    <!-- Cursor -->
    <rect x="516" y="262" width="20" height="36" rx="3" fill="#e94560" filter="url(#g2)"/>

    <!-- Output lines -->
    <rect x="172" y="320" width="340" height="18" rx="4" fill="#e94560" opacity="0.07"/>
    <rect x="172" y="350" width="240" height="18" rx="4" fill="#e94560" opacity="0.05"/>
    <rect x="172" y="380" width="400" height="18" rx="4" fill="#e94560" opacity="0.04"/>
    <rect x="172" y="410" width="180" height="18" rx="4" fill="#e94560" opacity="0.05"/>

    <!-- Prompt 2 -->
    <text x="172" y="490" font-family="monospace" font-size="48" fill="url(#ag)" font-weight="bold" filter="url(#g3)">❯</text>
    <rect x="224" y="464" width="160" height="32" rx="6" fill="#e94560" opacity="0.08"/>

    <!-- Split divider — glowing vertical line -->
    <line x1="600" y1="240" x2="600" y2="820" stroke="#e94560" stroke-width="2" opacity="0.35" filter="url(#g3)"/>

    <!-- Right pane content -->
    <rect x="636" y="264" width="200" height="16" rx="3" fill="#28c840" opacity="0.14"/>
    <rect x="636" y="292" width="150" height="14" rx="3" fill="#ffffff" opacity="0.05"/>
    <rect x="636" y="316" width="220" height="14" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="636" y="340" width="130" height="14" rx="3" fill="#febc2e" opacity="0.1"/>
    <rect x="636" y="364" width="190" height="14" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="636" y="388" width="160" height="14" rx="3" fill="#ffffff" opacity="0.04"/>
    <rect x="636" y="412" width="210" height="14" rx="3" fill="#e94560" opacity="0.06"/>
    <rect x="636" y="436" width="140" height="14" rx="3" fill="#ffffff" opacity="0.03"/>

    <!-- More output in left pane bottom -->
    <rect x="172" y="530" width="300" height="14" rx="3" fill="#ffffff" opacity="0.03"/>
    <rect x="172" y="554" width="200" height="14" rx="3" fill="#ffffff" opacity="0.03"/>

    <!-- Prompt 3 -->
    <text x="172" y="630" font-family="monospace" font-size="48" fill="url(#ag)" font-weight="bold" opacity="0.5">❯</text>

    <!-- Bottom accent glow -->
    <ellipse cx="512" cy="860" rx="250" ry="40" fill="#e94560" opacity="0.06"/>
  </g>
</svg>
