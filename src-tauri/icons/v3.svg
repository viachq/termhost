<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="r"><rect width="1024" height="1024" rx="220"/></clipPath>
    <filter id="gl">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#e94560" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#16161f"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#28283a"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- Very dark bg -->
    <rect width="1024" height="1024" fill="#040406"/>

    <!-- Subtle glow -->
    <ellipse cx="512" cy="512" rx="300" ry="280" fill="#e94560" opacity="0.04"/>

    <!-- Terminal — noticeably lighter, strong border -->
    <rect x="140" y="140" width="744" height="744" rx="44" fill="url(#termBg)" filter="url(#shadow)"/>
    <rect x="140" y="140" width="744" height="744" rx="44" fill="none" stroke="url(#borderGrad)" stroke-width="3"/>

    <!-- Dots -->
    <circle cx="206" cy="206" r="16" fill="#ff5f57"/>
    <circle cx="254" cy="206" r="16" fill="#febc2e"/>
    <circle cx="302" cy="206" r="16" fill="#28c840"/>

    <!-- Prompt 1 -->
    <text x="194" y="360" font-family="monospace" font-size="80" fill="url(#ac)" font-weight="700" filter="url(#gl)">❯</text>
    <rect x="296" y="308" width="360" height="56" rx="12" fill="#e94560" opacity="0.14"/>
    <rect x="672" y="306" width="28" height="60" rx="6" fill="#e94560" filter="url(#cg)"/>

    <!-- Output -->
    <rect x="194" y="400" width="480" height="32" rx="8" fill="#28c840" opacity="0.16"/>
    <rect x="194" y="450" width="340" height="32" rx="8" fill="#9898b0" opacity="0.12"/>
    <rect x="194" y="500" width="520" height="32" rx="8" fill="#9898b0" opacity="0.09"/>
    <rect x="194" y="550" width="280" height="32" rx="8" fill="#febc2e" opacity="0.13"/>

    <!-- Prompt 2 -->
    <text x="194" y="680" font-family="monospace" font-size="70" fill="url(#ac)" font-weight="700" filter="url(#gl)" opacity="0.55">❯</text>
    <rect x="286" y="638" width="260" height="48" rx="10" fill="#e94560" opacity="0.08"/>

    <!-- Prompt 3 -->
    <text x="194" y="808" font-family="monospace" font-size="60" fill="url(#ac)" font-weight="700" opacity="0.18">❯</text>
  </g>
</svg>
