name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  daemon:
    name: Daemon (Rust)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --check || echo "run 'cargo fmt' to fix"

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings 2>&1 | head -40 || true

      - name: Build
        run: cargo build --release 2>&1 | tail -10

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: termhostd-windows
          path: daemon/target/release/termhostd.exe
          if-no-files-found: warn

  frontend:
    name: Frontend (npm)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 | head -20 || echo "tsc check completed (may have errors)"

      - name: Build frontend
        run: npm run vite:build

      - name: Build mobile PWA
        run: npm run mobile:build

  tauri:
    name: Desktop (Tauri)
    runs-on: windows-latest
    needs: [daemon, frontend]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        run: npm ci

      - name: Install system deps (WebView2)
        run: |
          echo "WebView2 pre-installed on Windows GitHub runners"

      - name: Build Tauri app
        run: npx tauri build --bundles msi 2>&1 | tail -20

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: termhost-windows
          path: src-tauri/target/release/termhost.exe
          if-no-files-found: warn

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: termhost-installer
          path: src-tauri/target/release/**/*.msi
          if-no-files-found: warn

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [tauri, daemon, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/termhostd-windows/termhostd.exe
            artifacts/termhost-windows/termhost.exe
            artifacts/termhost-installer/*.msi
